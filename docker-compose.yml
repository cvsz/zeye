services:
  agentdvr:
    image: mekayelanik/ispyagentdvr:latest
    container_name: zeye-agentdvr
    restart: unless-stopped
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-Asia/Bangkok}"
      AGENTDVR_WEBUI_PORT: "${AGENTDVR_WEBUI_PORT:-9292}"
    ports:
      - "${AGENTDVR_HOST_PORT:-9292}:${AGENTDVR_WEBUI_PORT:-9292}"
      - "3478:3478/udp"
      - "50000-50100:50000-50100/udp"
    devices:
      - "${USB_VIDEO_DEVICE:-/dev/video0}:${USB_VIDEO_DEVICE:-/dev/video0}"
    group_add:
      - "video"
    volumes:
      - "${ZEYE_DATA_DIR:-/opt/zeye/agentdvr}/config:/AgentDVR/Media/XML"
      - "${ZEYE_DATA_DIR:-/opt/zeye/agentdvr}/media:/AgentDVR/Media/WebServerRoot/Media"
      - "${ZEYE_DATA_DIR:-/opt/zeye/agentdvr}/commands:/AgentDVR/Commands"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${AGENTDVR_WEBUI_PORT:-9292}/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
